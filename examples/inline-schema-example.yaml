openapi: 3.1.0
info:
  title: Inline Schema Example
  version: 1.0.0
paths:
  /pets:
    get:
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dog"
components:
  schemas:
    Animal:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer
      required:
        - name

    Mammal:
      allOf:
        - $ref: "#/components/schemas/Animal"
        - type: object
          properties:
            warmBlooded:
              type: boolean
              const: true

    Dog:
      allOf:
        - $ref: "#/components/schemas/Mammal"
        - type: object
          properties:
            breed:
              type: string
            bark:
              type: string
          required:
            - breed
