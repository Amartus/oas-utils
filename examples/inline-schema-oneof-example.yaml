openapi: 3.1.0
info:
  title: Inline Schema OneOf Example
  version: 1.0.0
paths:
  /items:
    get:
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemUnion"
components:
  schemas:
    StringItem:
      type: object
      properties:
        type:
          const: string
        value:
          type: string

    NumberItem:
      type: object
      properties:
        type:
          const: number
        value:
          type: number

    ItemUnion:
      oneOf:
        - $ref: "#/components/schemas/StringItem"
        - $ref: "#/components/schemas/NumberItem"
